<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global IoT Real-Time Terminal</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #1e1e1e; color: #d4d4d4; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .terminal-container { width: 100%; max-width: 800px; background: #252526; border: 1px solid #3c3c3c; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        .header { background: #333333; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e1e1e; }
        .status-box { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .pulse { width: 12px; height: 12px; background-color: #f44336; border-radius: 50%; box-shadow: 0 0 10px #f44336; }
        .connected .pulse { background-color: #4caf50; box-shadow: 0 0 15px #4caf50; animation: pulse-animation 1.5s infinite; }
        @keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .chat-box { height: 400px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 5px; max-width: 80%; word-wrap: break-word; }
        .msg-web { background: #0e639c; align-self: flex-end; color: white; }
        .msg-esp { background: #3c3c3c; align-self: flex-start; border-left: 4px solid #4caf50; }
        .time { font-size: 0.75em; opacity: 0.7; margin-bottom: 5px; display: block; }
        .input-area { display: flex; padding: 15px; background: #2d2d2d; border-top: 1px solid #3c3c3c; }
        input[type="text"] { flex: 1; padding: 12px; background: #1e1e1e; border: 1px solid #3c3c3c; color: white; border-radius: 4px; font-family: inherit; font-size: 16px; outline: none; }
        input[type="text"]:focus { border-color: #0e639c; }
        button { padding: 0 25px; margin-left: 10px; background: #0e639c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #1177bb; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="header">
            <div>📡 IPCS Global MQTT Bridge</div>
            <div class="status-box" id="statusBox">
                <div class="pulse"></div>
                <span id="statusText">Connecting to Broker...</span>
            </div>
        </div>
        
        <div class="chat-box" id="chatBox">
            </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type command for ESP32..." disabled>
            <button id="sendBtn" disabled>SEND TX</button>
        </div>
    </div>

    <script>
        // Use HiveMQ's Public WebSocket Broker for Global Real-Time connection
        const brokerUrl = 'wss://broker.hivemq.com:8000/mqtt';
        
        // Define unique topics for bidirectional flow
        const TOPIC_WEB_TO_ESP = "ipcs/vikas/web_tx";
        const TOPIC_ESP_TO_WEB = "ipcs/vikas/esp_tx";

        // Connect to the broker
        const client = mqtt.connect(brokerUrl);

        const statusBox = document.getElementById('statusBox');
        const statusText = document.getElementById('statusText');
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // Event: When successfully connected to the global cloud
        client.on('connect', () => {
            statusBox.classList.add('connected');
            statusText.innerText = "Broker Live (0ms latency)";
            messageInput.disabled = false;
            sendBtn.disabled = false;
            
            // Subscribe to listen to the ESP32
            client.subscribe(TOPIC_ESP_TO_WEB);
            appendMessage("SYSTEM", "Connected to Global MQTT Broker. Waiting for ESP32 sync...", "msg-esp");
        });

        // Event: When a message arrives from the ESP32
        client.on('message', (topic, message) => {
            if (topic === TOPIC_ESP_TO_WEB) {
                appendMessage("ESP32 Hardware", message.toString(), "msg-esp");
            }
        });

        // Function to send data to the ESP32
        function sendMessage() {
            const msg = messageInput.value.trim();
            if (msg === "") return;

            // Publish message to the cloud
            client.publish(TOPIC_WEB_TO_ESP, msg);
            
            // Update UI
            appendMessage("Web UI", msg, "msg-web");
            messageInput.value = '';
        }

        // UI Function to add chat bubbles
        function appendMessage(sender, text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${className}`;
            
            const now = new Date();
            const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}.${String(now.getMilliseconds()).padStart(3, '0')}`;
            
            msgDiv.innerHTML = `<span class="time">[${timeStr}] ${sender}</span>${text}`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
        }

        // Event listeners for sending
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
